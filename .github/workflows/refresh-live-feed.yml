name: Refresh Live Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write

jobs:
  refresh-live-feed:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate live feed snapshot
        run: python3 tooling/generate_temporary_live_feed.py

      - name: Commit updated snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh temporary live feed"
          file_pattern: data/temporary-live-feed.json src/web/public/data/temporary-live-feed.json
