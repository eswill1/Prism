name: Web CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build:web
